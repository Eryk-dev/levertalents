server {
  listen       80;
  server_name  _;

  root   /usr/share/nginx/html;
  index  index.html;

  # Compressão
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_vary on;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/wasm
    image/svg+xml
    font/ttf
    font/woff
    font/woff2;

  # Headers de segurança básicos (ajuste CSP conforme seu domínio real).
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(self), camera=()" always;

  # Health check do container.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Assets com hash no filename (Vite gera /assets/*.[hash].*) — cache longo.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback: qualquer rota não-arquivo devolve index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # index.html nunca deve cachear (precisa refletir novo deploy imediatamente).
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }
}
